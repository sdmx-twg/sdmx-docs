# Workflow inspiration and adaptation came from Andruino-Cli
# https://github.com/arduino/arduino-cli/blob/master/.github/workflows/deploy-cobra-mkdocs-versioned-poetry.yml
# and https://github.com/squidfunk/mkdocs-material/discussions/6546

name: docs-publish

env:
  ENABLE_PDF_EXPORT: 1
  PYTHON_VERSION: "3.12"

permissions:
  contents: write

on:
  push:
    branches:
      - main
      - dev
      # Release branches have names like docs_v2.1, docs_v3.0, ...
      - "docs_v*.*"
  pull_request:
    branches:
      - main
      - dev
      # Release branches have names like docs_v2.1, docs_v3.0, ...
      - "docs_v*.*"

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: false

jobs:
  pre-publish:
    runs-on: ubuntu-latest
    outputs:
      result: ${{ steps.determination.outputs.result }}
    steps:
      - name: Determine if documentation should be published on this workflow run
        id: determination
        run: |
          if [[ "${{ github.event_name }}" == "push" || "${{ github.event_name }}" == "pull_request" ]]; then
            RESULT="true"
          else
            RESULT="false"
          fi

          echo "result=$RESULT" >> $GITHUB_OUTPUT
          echo "Deploy documents: $RESULT"

  publish:
    runs-on: ubuntu-latest
    needs: pre-publish
    if: needs.pre-publish.outputs.result == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v6
        with:
            enable-cache: true

      - name: Install Python 3.12
        run: uv python install 3.12

      - name: Install Dependencies
        run: uv sync

      - name: Determine versioning parameters
        id: determine-versioning
        run: |
          # Read the first line from the VERSION file
          LINE=$(head -n 1 ./VERSION)

          # Extract version and alias using parameter expansion
          VERSION="${LINE%%|*}"
          if [[ "$LINE" == *"|"* ]]; then
              ALIAS="${LINE#*|}"
          else
              ALIAS=""
          fi

          # Print the extracted values for verification
          echo "Version: $VERSION"
          echo "Alias: $ALIAS"

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "alias=$ALIAS" >> $GITHUB_OUTPUT

      - name: Deploy
        if: ${{ steps.determine-versioning.outputs.version != '' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch --no-tags --prune origin gh-pages

          DEPLOY_ARGS="${{ steps.determine-versioning.outputs.version }}"
          if [[ -n "${{ steps.determine-versioning.outputs.alias }}" ]]; then
            DEPLOY_ARGS="$DEPLOY_ARGS ${{ steps.determine-versioning.outputs.alias }}"
          fi

          PUSH_FLAG=""
          if [[ "${{ github.event_name }}" == "push" ]]; then
            PUSH_FLAG="--push"
          fi

          uv run mike set-default $PUSH_FLAG latest
          uv run mike deploy \
            --update-aliases \
            --branch gh-pages \
            $PUSH_FLAG \
            $DEPLOY_ARGS

      - name: Publish llms.txt files to gh-pages
        if: ${{ github.event_name == 'push' && steps.determine-versioning.outputs.version != '' }}
        run: |
          set -euo pipefail

          if [[ ! -f "llms_top.txt" ]]; then
            echo "Missing source file: llms_top.txt"
            exit 1
          fi

          if [[ ! -f "llms_version.txt" ]]; then
            echo "Missing source file: llms_version.txt"
            exit 1
          fi

          git fetch --no-tags --prune origin gh-pages

          WORKTREE_DIR="$(mktemp -d)"
          git worktree add -B gh-pages-llms "$WORKTREE_DIR" origin/gh-pages

          VERSION_DIR="$WORKTREE_DIR/${{ steps.determine-versioning.outputs.version }}"
          if [[ ! -d "$VERSION_DIR" ]]; then
            echo "Expected version directory not found: $VERSION_DIR"
            git worktree remove "$WORKTREE_DIR" --force
            exit 1
          fi

          ROOT_BEFORE=""
          if [[ -f "$WORKTREE_DIR/llms.txt" ]]; then
            ROOT_BEFORE="$(sha256sum "$WORKTREE_DIR/llms.txt" | awk '{print $1}')"
          fi

          cp "llms_version.txt" "$VERSION_DIR/llms.txt"
          if ! cmp -s "llms_version.txt" "$VERSION_DIR/llms.txt"; then
            echo "Version llms.txt verification failed"
            git worktree remove "$WORKTREE_DIR" --force
            exit 1
          fi

          if [[ "${{ github.ref_name }}" == "main" ]]; then
            cp "llms_top.txt" "$WORKTREE_DIR/llms.txt"
            if ! cmp -s "llms_top.txt" "$WORKTREE_DIR/llms.txt"; then
              echo "Root llms.txt verification failed"
              git worktree remove "$WORKTREE_DIR" --force
              exit 1
            fi
          fi

          if [[ "${{ github.ref_name }}" != "main" ]]; then
            ROOT_AFTER=""
            if [[ -f "$WORKTREE_DIR/llms.txt" ]]; then
              ROOT_AFTER="$(sha256sum "$WORKTREE_DIR/llms.txt" | awk '{print $1}')"
            fi
            if [[ "$ROOT_BEFORE" != "$ROOT_AFTER" ]]; then
              echo "Non-main branch must not change root llms.txt"
              git worktree remove "$WORKTREE_DIR" --force
              exit 1
            fi
          fi

          git -C "$WORKTREE_DIR" config user.name "github-actions[bot]"
          git -C "$WORKTREE_DIR" config user.email "github-actions[bot]@users.noreply.github.com"
          git -C "$WORKTREE_DIR" add "${{ steps.determine-versioning.outputs.version }}/llms.txt"
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            git -C "$WORKTREE_DIR" add llms.txt
          fi

          if [[ -n "$(git -C "$WORKTREE_DIR" status --porcelain)" ]]; then
            git -C "$WORKTREE_DIR" commit -m "ci: publish llms.txt artifacts"
            git -C "$WORKTREE_DIR" push origin HEAD:gh-pages
          else
            echo "No llms.txt changes to publish"
          fi

          git worktree remove "$WORKTREE_DIR" --force