# Workflow inspiration and adaptation came from Andruino-Cli
# https://github.com/arduino/arduino-cli/blob/master/.github/workflows/deploy-cobra-mkdocs-versioned-poetry.yml
# and https://github.com/squidfunk/mkdocs-material/discussions/6546

name: docs-publish

env:
  ENABLE_PDF_EXPORT: 1
  PYTHON_VERSION: "3.12"

permissions:
  contents: write

on:
  push:
    branches:
      - main
      - dev
      # Release branches have names like docs_v2.1, docs_v3.0, ...
      - "docs_v*.*"
  create:

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: false

jobs:
  pre-publish:
    runs-on: ubuntu-latest
    outputs:
      result: ${{ steps.determination.outputs.result }}
    steps:
      - name: Determine if documentation should be published on this workflow run
        id: determination
        run: |
          RELEASE_BRANCH_REGEX="^refs/heads/docs_v[0-9]+\.[0-9]+$"
          if [[ "${{ github.event_name }}" == "push" || ( "${{ github.event_name }}" == "create" && "${{ github.ref }}" =~ $RELEASE_BRANCH_REGEX ) ]]; then
            RESULT="true"
          else
            RESULT="false"
          fi

          echo "result=$RESULT" >> $GITHUB_OUTPUT
          echo "Deploy documents: $RESULT"

  publish:
    runs-on: ubuntu-latest
    needs: pre-publish
    if: needs.pre-publish.outputs.result == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v6
        with:
            enable-cache: true

      - name: Install Python 3.12
        run: uv python install 3.12

      - name: Install Dependencies
        run: uv sync

      - name: Determine versioning parameters
        id: determine-versioning
        run: |
          # Read the first line from the VERSION file
          LINE=$(head -n 1 ./VERSION)

          # Extract version and alias using parameter expansion
          VERSION="${LINE%%|*}"
          if [[ "$LINE" == *"|"* ]]; then
              ALIAS="${LINE#*|}"
          else
              ALIAS=""
          fi

          # Print the extracted values for verification
          echo "Version: $VERSION"
          echo "Alias: $ALIAS"

          echo "PH_DOCS_VERSION=$VERSION" >> $GITHUB_ENV
          echo "PH_DOCS_ALIAS=$ALIAS" >> $GITHUB_ENV

      - name: Deploy
        if: ${{ env.PH_DOCS_VERSION != '' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch --no-tags --prune origin gh-pages
          DEPLOY_ARGS="${{ env.PH_DOCS_VERSION }}"
          if [[ -n "${{ env.PH_DOCS_ALIAS }}" ]]; then
            DEPLOY_ARGS="$DEPLOY_ARGS ${{ env.PH_DOCS_ALIAS }}"
          fi
          uv run mike set-default --push latest
          uv run mike deploy \
            --update-aliases \
            --branch gh-pages \
            --push \
            $DEPLOY_ARGS